<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>佰睿昇公司</title>
  <link rel="stylesheet" href="style.css?v=20260717-v7" />
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <div class="hero__center">
        <div class="eyebrow">BAIRUISHENG DIGITAL ASSET CENTER</div>
        <h1 id="siteTitle">佰睿昇公司</h1>
        <p id="heroDesc">企业数字素材中心 · 统一管理、快速查找、便捷分享</p>
        <div class="hero__stats">
          <div class="stat-pill"><span>文件夹</span><strong id="heroFolders">--</strong></div>
          <div class="stat-pill"><span>文件</span><strong id="heroFiles">--</strong></div>
          <div class="stat-pill"><span>当前路径</span><strong id="heroPath">首页</strong></div>
        </div>
      </div>
      <button id="refreshBtn" class="btn btn-primary">刷新内容</button>
    </div>
  </header>

  <main class="shell">
    <section class="toolbar panel">
      <div class="toolbar-left">
        <button id="backBtn" class="btn btn-light" disabled>← 返回上一级</button>
        <nav id="breadcrumbs"></nav>
      </div>
      <input id="searchInput" type="search" placeholder="搜索当前目录..." />
    </section>

    <section class="summary">
      <div class="summary-card panel"><span>当前目录文件夹</span><strong id="metricFolders">0</strong></div>
      <div class="summary-card panel"><span>当前目录文件</span><strong id="metricFiles">0</strong></div>
      <div class="summary-card panel"><span>状态</span><strong id="metricStatus">等待加载</strong></div>
    </section>

    <section id="status" class="status panel">正在加载素材目录...</section>
    <section id="grid" class="grid"></section>
  </main>

  <dialog id="previewDialog">
    <button id="closeDialog" class="close">×</button>
    <div class="preview">
      <img id="previewImage" alt="" />
      <div class="preview-info">
        <h2 id="previewName"></h2>
        <p id="previewPath"></p>
        <div class="preview-actions">
          <a id="openOriginal" target="_blank" rel="noopener" class="btn btn-primary">浏览器查看</a>
          <a id="downloadFile" class="btn btn-light">下载图片</a>
          <button id="copyLink" class="btn btn-light">复制图片链接</button>
        </div>
      </div>
    </div>
  </dialog>

  <script src="config.js?v=20260717-v7"></script>
  <script src="app.js?v=20260717-v7"></script>
</body>
</html>
