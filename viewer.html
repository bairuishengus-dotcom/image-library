<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>图片预览</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0b1020;color:#fff;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .top{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;background:rgba(11,16,32,.86);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
    h1{margin:0;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    a,button{border:0;border-radius:10px;padding:10px 14px;text-decoration:none;cursor:pointer;font:inherit}
    a{background:#2e6bff;color:#fff}button{background:#eef4ff;color:#24499f}
    .stage{min-height:calc(100vh - 70px);display:grid;place-items:center;padding:24px}
    img{max-width:100%;max-height:calc(100vh - 120px);object-fit:contain;filter:drop-shadow(0 22px 55px rgba(0,0,0,.35))}
    .error{padding:30px;color:#ffb4b4}
  </style>
</head>
<body>
  <header class="top">
    <h1 id="title">图片预览</h1>
    <div class="actions">
      <a id="raw" target="_blank" rel="noopener">打开原图</a>
      <button id="copy">复制当前链接</button>
    </div>
  </header>
  <main class="stage"><img id="image" alt=""></main>

  <script src="config.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const key = params.get("key") || "";
    const name = params.get("name") || key.split("/").pop() || "图片预览";
    document.title = name;
    document.querySelector("#title").textContent = name;

    const cfg = window.IMAGE_LIBRARY_CONFIG || {};
    const endpoint = `https://${cfg.bucket}.cos.${cfg.region}.myqcloud.com`;
    const rawUrl = `${endpoint}/${key.split("/").map(encodeURIComponent).join("/")}`;

    const image = document.querySelector("#image");
    image.src = rawUrl;
    image.alt = name;
    image.onerror = () => {
      document.querySelector(".stage").innerHTML = '<div class="error">图片加载失败，请检查 COS 文件权限或地址。</div>';
    };

    document.querySelector("#raw").href = rawUrl;
    document.querySelector("#copy").onclick = async () => {
      try {
        await navigator.clipboard.writeText(location.href);
        const btn = document.querySelector("#copy");
        btn.textContent = "已复制";
        setTimeout(() => btn.textContent = "复制当前链接", 1200);
      } catch {
        prompt("复制下面的链接：", location.href);
      }
    };
  </script>
</body>
</html>
